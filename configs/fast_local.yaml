# Use this for low-latency runs: local embeddings plus Groq generation on FAISS.
version: "1.0"
pipeline: naive

plugins:
  llm:
    provider: groq
    model: llama-3.1-8b-instant
    api_key: ${GROQ_API_KEY}
    temperature: 0.1
    max_tokens: 512

  embedding:
    provider: bge
    model: bge-small-en-v1.5
    batch_size: 64

  vectorstore:
    provider: faiss
    index_name: rag-fast-local
    top_k: 5

  retrieval:
    strategy: vector
    top_k: 5
    hybrid_alpha: 0.5

  reranker:
    enabled: false
    provider: bge
    top_k: 3

  chunking:
    strategy: fixed
    chunk_size: 384
    overlap: 32

  caching:
    embeddings: true
    retrieval: true
    llm: true

  observability:
    tracing: true
    cost_tracking: true
    log_level: INFO
