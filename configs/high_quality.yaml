# Use this for best answer quality: hybrid retrieval, Weaviate index, Opus generation, and reranking.
version: "1.0"
pipeline: hybrid

plugins:
  llm:
    provider: anthropic
    model: claude-opus-4-6
    api_key: ${ANTHROPIC_API_KEY}
    temperature: 0.1
    max_tokens: 1536

  embedding:
    provider: openai
    model: text-embedding-3-small
    api_key: ${OPENAI_API_KEY}
    batch_size: 32

  vectorstore:
    provider: weaviate
    index_name: rag-high-quality
    api_key: ${WEAVIATE_API_KEY}
    top_k: 8

  retrieval:
    strategy: hybrid
    top_k: 8
    hybrid_alpha: 0.5

  reranker:
    enabled: true
    provider: cohere
    model: rerank-english-v3.0
    api_key: ${COHERE_API_KEY}
    top_k: 5

  chunking:
    strategy: recursive
    chunk_size: 768
    overlap: 80

  caching:
    embeddings: true
    retrieval: true
    llm: true

  observability:
    tracing: true
    cost_tracking: true
    log_level: INFO
